<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EncryptSecret — Redirecting…</title>
    <!-- Favicon (inline SVG as data URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2300c896'/><path d='M16 6 L24 10 L24 18 Q24 24 16 27 Q8 24 8 18 L8 10 Z' fill='none' stroke='white' stroke-width='2'/></svg>" />
  <script>
    // GitHub Pages shows this 404.html whenever a URL path doesn't match a real file.
    // This script handles clean URL redirects for all three tools:
    //
    //   /read?id=...              → /read.html?id=...
    //   /read-encryptpass?id=...  → /read-encryptpass.html?id=...
    //   /read-pastebin?id=...     → /read-pastebin.html?id=...
    //
    // Everything else → homepage

    (function () {
      const path   = window.location.pathname; // e.g. "/read-encryptpass"
      const search = window.location.search;   // e.g. "?id=abc123"

      // Strip trailing slash for clean matching
      const cleanPath = path.replace(/\/$/, "");

      // Build base (handles subfolder deployments like /encryptsecret/)
      const getBase = (suffix) =>
        window.location.pathname.replace(new RegExp(suffix + "\\/?$"), "");

      if (cleanPath.endsWith("/read")) {
        const base = getBase("/read");
        window.location.replace(base + "/read.html" + search);

      } else if (cleanPath.endsWith("/read-encryptpass")) {
        const base = getBase("/read-encryptpass");
        window.location.replace(base + "/read-encryptpass.html" + search);

      } else if (cleanPath.endsWith("/read-pastebin")) {
        const base = getBase("/read-pastebin");
        window.location.replace(base + "/read-pastebin.html" + search);

      } else if (cleanPath.endsWith("/encryptpass")) {
        const base = getBase("/encryptpass");
        window.location.replace(base + "/encryptpass.html");

      } else if (cleanPath.endsWith("/pastebin")) {
        const base = getBase("/pastebin");
        window.location.replace(base + "/pastebin.html");

      } else {
        // Unknown path — go home
        window.location.replace("/");
      }
    })();
  </script>
  <link rel="apple-touch-icon" href="/assets/img/icon-192.png" />
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:4rem;color:#888;">
    Redirecting… if nothing happens,
    <a href="/">click here to create a secret</a>.
  </p>
    <script type="module">
    import { initThemeToggle } from './assets/js/toggle.js';
    initThemeToggle();
  </script>
  <script src="/assets/js/pwa.js"></script>
</body>
</html>
